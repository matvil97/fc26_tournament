<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournoi FC26 - Inscription</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">🏆 FC26 Tournament</a>
      <div class="nav-links">
        <a href="/" class="nav-link active">Inscriptions</a>
        <a href="/groups.html" class="nav-link">Poules & classements</a>
      </div>
    </div>
  </nav>

  <div class="bg-glow"></div>

  <main class="container">
    <section class="card">
      <div class="badge">🏆 FC26 • Tournoi officiel</div>

      <h1>TOURNOI FC26</h1>
      <p class="subtitle">Samedi 9 mai 2026</p>

      <div class="info-box">
        <p><strong>💰 Participation :</strong> 10 €</p>
        <p><strong>⚡ Inscription :</strong> confirmée uniquement après paiement</p>
        <p><strong>🎮 Cross-play :</strong> activé</p>
      </div>

      <div class="live-counter" id="liveCounter">
        <div class="live-counter-label">📊 Inscriptions en direct</div>
        <div class="live-counter-value">
          <span id="paidCount">0</span> / <span id="maxPlayers">40</span>
        </div>
        <div class="live-counter-subtext">
          Places restantes : <span id="remainingSpots">40</span>
        </div>
      </div>

      <form id="registrationForm">
        <label for="nomPrenom">👤 Nom / Prénom</label>
        <input
          type="text"
          id="nomPrenom"
          name="nomPrenom"
          placeholder="Ex. Jean Dupont"
          required
        />

        <label for="pseudo">🎯 Pseudo gamer</label>
        <input
          type="text"
          id="pseudo"
          name="pseudo"
          placeholder="Ex. FCMaster75"
          required
        />

        <label for="telephone">📱 Téléphone</label>
        <input
          type="tel"
          id="telephone"
          name="telephone"
          placeholder="Ex. 06 12 34 56 78"
          required
        />

        <label for="email">📧 Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Ex. joueur@email.com"
          required
        />

        <label for="console">🎮 Plateforme</label>
        <select id="console" name="console" required>
          <option value="">Choisir une plateforme</option>

          <optgroup label="🎮 PlayStation">
            <option value="PS5">🎮 PS5</option>
            <option value="PS4">🎮 PS4</option>
          </optgroup>

          <optgroup label="🟢 Xbox">
            <option value="Xbox Series X">🟢 Xbox Series X</option>
            <option value="Xbox Series S">🟢 Xbox Series S</option>
            <option value="Xbox One X">🟢 Xbox One X</option>
            <option value="Xbox One S">🟢 Xbox One S</option>
            <option value="Xbox One">🟢 Xbox One</option>
          </optgroup>

          <optgroup label="💻 PC">
            <option value="PC">💻 PC</option>
          </optgroup>
        </select>

        <button type="submit" id="payBtn">
          ⚡ S’inscrire et payer 10 €
        </button>

        <p id="statusMessage"></p>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
